name: Deploy to Hetzner-2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via rsync
        env:
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HOST: ${{ secrets.HETZNER_HOST }}   # = 49.13.206.214 (Hetzner-2)
          USER: ${{ secrets.HETZNER_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no "$USER@$HOST" \
            "mkdir -p /var/www/samolabs"
          rsync -avz --delete \
            --exclude='.git' --exclude='.github' \
            -e "ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no" \
            ./ "$USER@$HOST:/var/www/samolabs/"
          rm /tmp/deploy_key
          echo "✅ Deployed to /var/www/samolabs"
